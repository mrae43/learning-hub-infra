version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci-cd"
    groups:
      github-actions-all:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    groups:
      development-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "import-linter"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "import-linter"
