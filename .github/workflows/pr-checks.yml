name: PR Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ${{ matrix.package }} — lint, typecheck, tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [core, retrieval_qa, depth_dive, api, ingestion]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.24"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Ruff lint
        run: uv run ruff check ${{ matrix.package }}
      - name: Ruff format
        run: uv run ruff format --check ${{ matrix.package }}
      - name: Mypy
        run: uv run mypy ${{ matrix.package }}
      - name: Pytest
        run: uv run pytest ${{ matrix.package }}

  boundaries:
    name: import-linter module boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.24"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Import-linter
        run: uv run lint-imports

  commitlint:
    name: commit message format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs
