services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learning_hub
      POSTGRES_PASSWORD: learning_hub
      POSTGRES_DB: learning_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_hub -d learning_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://learning_hub:learning_hub@postgres:5432/learning_hub
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
