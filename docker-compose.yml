services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learning_hub
      POSTGRES_PASSWORD: learning_hub
      POSTGRES_DB: learning_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_hub -d learning_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
