[alembic]
script_location = core/src/core/database/migrations
prepend_sys_path = .
version_path_separator = os

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[alembic:core]
# SQLAlchemy URL is read from the DATABASE_URL environment variable by env.py.
# Default below points at the local docker-compose service for convenience.
sqlalchemy.url = postgresql+psycopg2://learning_hub:learning_hub@localhost:5432/learning_hub
